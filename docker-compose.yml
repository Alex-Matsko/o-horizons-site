services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: o-horizons-site
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mailer
      - nextjs
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile
    container_name: o-horizons-mailer
    env_file: .env
    restart: unless-stopped
    expose:
      - "3000"

  nextjs:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: o-horizons-nextjs
    env_file: ./site/.env.local
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - mailer

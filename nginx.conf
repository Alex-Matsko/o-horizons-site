server {
    listen 80;
    server_name _;

    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # sitemap + robots — short cache
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        expires 1d;
        add_header Cache-Control "public, no-cache";
    }

    # EN version: /en/ and /en -> serve index-en.html (keep /en/ in URL)
    location = /en/ {
        try_files /index-en.html =404;
    }
    location = /en {
        return 301 /en/;
    }

    # Proxy API requests to mailer service
    location /api/ {
        proxy_pass http://mailer:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://api.fontshare.com; img-src 'self' data: https://mc.yandex.ru; connect-src 'self' https://www.google-analytics.com https://mc.yandex.ru; frame-src 'none';" always;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── o-horizons.com (main site) ───────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name o-horizons.com www.o-horizons.com;

    ssl_certificate     /etc/letsencrypt/live/o-horizons.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/o-horizons.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml image/svg+xml;
    gzip_min_length 256;

    location ~* \.(css|js|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        expires 1d;
        add_header Cache-Control "public, no-cache";
    }
    location = /en/  { try_files /index-en.html =404; }
    location = /en   { return 301 /en/; }
    location = /calculator  { try_files /calculator.html =404; }
    location = /calculator/ { return 301 /calculator; }

    location /api/ {
        proxy_pass http://mailer:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }
    location / { try_files $uri $uri/ =404; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://api.fontshare.com; img-src 'self' data: https://mc.yandex.ru https://mc.yandex.com; connect-src 'self' https://www.google-analytics.com https://mc.yandex.ru https://mc.yandex.com; frame-src 'none';" always;
}

# ── 1c.o-horizons.com (portal) ───────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name 1c.o-horizons.com;

    ssl_certificate     /etc/letsencrypt/live/1c.o-horizons.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1c.o-horizons.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    server_tokens off;
    client_max_body_size 200m;

    # API → Fastify
    location /api/ {
        proxy_pass http://portal-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA → React
    location / {
        proxy_pass http://portal-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

services:
  portal-db:
    image: postgres:16-alpine
    container_name: portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PORTAL_DB_NAME:-portal}
      POSTGRES_USER: ${PORTAL_DB_USER:-portal}
      POSTGRES_PASSWORD: ${PORTAL_DB_PASS}
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    networks:
      - portal-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PORTAL_DB_USER:-portal}']
      interval: 10s
      timeout: 5s
      retries: 5

  portal-redis:
    image: redis:7-alpine
    container_name: portal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - portal_redis_data:/data
    networks:
      - portal-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  portal-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      portal-db:
        condition: service_healthy
      portal-redis:
        condition: service_healthy
    networks:
      - portal-net
    volumes:
      - /opt/1c/backups:/backups:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  portal-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal-worker
    restart: unless-stopped
    command: node src/worker.js
    env_file: .env
    depends_on:
      portal-db:
        condition: service_healthy
      portal-redis:
        condition: service_healthy
    networks:
      - portal-net
    volumes:
      - /opt/1c/backups:/backups:rw
      - /opt/1c/templates:/templates:ro
      - ${SSH_KEY_PATH:-/root/.ssh/portal_deploy}:/root/.ssh/portal_deploy:ro

  portal-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portal-frontend
    restart: unless-stopped
    networks:
      - portal-net

  portal-nginx:
    image: nginx:alpine
    container_name: portal-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx/1c.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      portal-backend:
        condition: service_healthy
      portal-frontend:
        condition: service_started
      portal-worker:
        condition: service_started
    networks:
      - portal-net

volumes:
  portal_db_data:
  portal_redis_data:

networks:
  portal-net:
    driver: bridge

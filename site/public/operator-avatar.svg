<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd8b0"/>
      <stop offset="100%" stop-color="#f4c08e"/>
    </linearGradient>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- shoulders / collar -->
  <path d="M12 62c1-11 9-17 20-17s19 6 20 17" fill="#0f172a"/>
  <path d="M20 55c4-3 8-4 12-4s8 1 12 4l-2 6H22z" fill="#1e293b"/>

  <!-- neck -->
  <rect x="27" y="34" width="10" height="10" rx="4" fill="url(#skin)"/>

  <!-- head -->
  <ellipse cx="32" cy="26" rx="13" ry="14" fill="url(#skin)"/>

  <!-- hair -->
  <path d="M19 24c-1-9 6-15 13-15s14 6 13 15c-2-4-6-6-9-6-1 2-3 3-5 3-1-2-2-3-4-3-3 1-6 3-8 6z" fill="#3f2d1c"/>

  <!-- ears -->
  <circle cx="18.5" cy="27" r="2.6" fill="url(#skin)"/>
  <circle cx="45.5" cy="27" r="2.6" fill="url(#skin)"/>

  <!-- friendly smile -->
  <path d="M26 30c1.5 2 3.5 3 6 3s4.5-1 6-3" stroke="#7a4a2b" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="27" cy="24" r="1.6" fill="#1e293b"/>
  <circle cx="37" cy="24" r="1.6" fill="#1e293b"/>
  <!-- cheeks -->
  <circle cx="24" cy="28" r="2" fill="#ff9d7a" opacity="0.35"/>
  <circle cx="40" cy="28" r="2" fill="#ff9d7a" opacity="0.35"/>

  <!-- headset -->
  <path d="M15 25a17 17 0 0 1 34 0" stroke="#0f172a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <rect x="12.5" y="24" width="5" height="9" rx="2.5" fill="#0f172a"/>
  <rect x="46.5" y="24" width="5" height="9" rx="2.5" fill="#0f172a"/>
  <path d="M49 32.5v3.5c0 2.2-1.8 4-4 4h-2.5" stroke="#0f172a" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <circle cx="42.2" cy="40" r="2.4" fill="#0f172a"/>

  <!-- online badge -->
  <circle cx="51" cy="51" r="7" fill="#0b1220"/>
  <circle cx="51" cy="51" r="5" fill="#22c55e"/>
</svg>

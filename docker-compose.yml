services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: o-horizons-site
    ports:
      - "80:80"
    depends_on:
      - site
      - mailer
    restart: unless-stopped

  site:
    build:
      context: ./site
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID:-}
        NEXT_PUBLIC_SANITY_DATASET: ${NEXT_PUBLIC_SANITY_DATASET:-production}
    container_name: o-horizons-nextsite
    environment:
      - MAILER_URL=http://mailer:3000
    depends_on:
      - mailer
    restart: unless-stopped
    expose:
      - "3000"

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile
    container_name: o-horizons-mailer
    env_file: .env
    restart: unless-stopped
    depends_on:
      - xray
    expose:
      - "3000"
    volumes:
      - mailer-data:/app/data

  # Local SOCKS5 egress for the mailer's Telegram API calls (api.telegram.org
  # is blocked from RU IPs). Connects out through your own 3X-UI/Xray VPN —
  # see xray/config.example.json for the config shape; the real
  # xray/config.json (with your VLESS/Reality credentials) is gitignored,
  # create it on the host directly.
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: o-horizons-xray
    restart: unless-stopped
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    command: ["run", "-config", "/etc/xray/config.json"]
    expose:
      - "1080"
    ports:
      # Also reachable from the host itself (127.0.0.1 only) — lets git/curl/
      # docker on the host use the same SOCKS5 egress, not just containers.
      - "127.0.0.1:1080:1080"

volumes:
  mailer-data:

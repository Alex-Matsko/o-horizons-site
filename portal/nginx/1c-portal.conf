server {
    listen 80;
    server_name 1c.o-horizons.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 1c.o-horizons.com;

    ssl_certificate     /etc/letsencrypt/live/1c.o-horizons.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1c.o-horizons.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 512m;

    # Frontend (React SPA)
    location / {
        root /var/www/1c-portal/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Backup file downloads (streamed)
    location /downloads/ {
        internal;
        alias /opt/1c-backups/;
    }

    access_log /var/log/nginx/1c-portal.access.log;
    error_log  /var/log/nginx/1c-portal.error.log;
}

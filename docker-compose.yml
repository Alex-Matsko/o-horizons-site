services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: o-horizons-site
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mailer
      - portal-api
      - portal-frontend
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile
    container_name: o-horizons-mailer
    env_file: .env
    restart: unless-stopped
    expose:
      - "3000"

  portal-api:
    build:
      context: ./portal/backend
      dockerfile: Dockerfile
    container_name: portal-api
    env_file: ./portal/.env
    expose:
      - "3001"
    depends_on:
      portal-db:
        condition: service_healthy
      portal-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - portal-internal
    volumes:
      - portal_backups:/backups

  portal-worker:
    build:
      context: ./portal/backend
      dockerfile: Dockerfile
    container_name: portal-worker
    command: ["node", "src/worker.js"]
    env_file: ./portal/.env
    depends_on:
      portal-db:
        condition: service_healthy
      portal-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - portal-internal
    volumes:
      - portal_backups:/backups

  portal-frontend:
    build:
      context: ./portal/frontend
      dockerfile: Dockerfile
    container_name: portal-frontend
    expose:
      - "80"
    restart: unless-stopped

  portal-db:
    image: postgres:16-alpine
    container_name: portal-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: ${PORTAL_DB_PASSWORD}
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    networks:
      - portal-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  portal-redis:
    image: redis:7-alpine
    container_name: portal-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - portal-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  portal_db_data:
  portal_backups:

networks:
  portal-internal:
    driver: bridge
